<!DOCTYPE html>
<html lang="da">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SkærmTjek Admin — Batch AI-berigelse</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: -apple-system, BlinkMacSystemFont, sans-serif;
  background: #faf7f2;
  color: #1a1714;
  padding: 2rem 1rem;
  max-width: 900px;
  margin: 0 auto;
  line-height: 1.6;
}
h1 { font-size: 24px; margin-bottom: 8px; }
p.intro { color: #666; margin-bottom: 1.5rem; font-size: 14px; }

.panel {
  background: white;
  padding: 1.5rem;
  border-radius: 12px;
  border: 1px solid #e0d8cc;
  margin-bottom: 1rem;
}

.stats {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 12px;
  margin-bottom: 1.5rem;
}
.stat {
  background: #f5f2ed;
  padding: 12px;
  border-radius: 8px;
  text-align: center;
}
.stat-num {
  font-size: 28px;
  font-weight: 700;
  color: #185FA5;
  line-height: 1;
}
.stat-label {
  font-size: 11px;
  color: #666;
  text-transform: uppercase;
  letter-spacing: 0.05em;
  margin-top: 4px;
}

label { display: block; font-size: 13px; font-weight: 500; margin-bottom: 4px; margin-top: 12px; }
input, select {
  padding: 10px 12px;
  border: 1px solid #e0d8cc;
  border-radius: 8px;
  font-size: 15px;
  background: white;
  width: 100%;
}
button {
  padding: 12px 20px;
  background: #c85a2a;
  color: white;
  border: none;
  border-radius: 10px;
  font-size: 15px;
  font-weight: 500;
  cursor: pointer;
  margin-top: 16px;
  margin-right: 8px;
}
button:disabled { opacity: 0.5; cursor: not-allowed; }
button.secondary { background: #666; }
button.danger { background: #c83a2a; }

.progress-bar {
  width: 100%;
  height: 8px;
  background: #e0d8cc;
  border-radius: 4px;
  margin: 12px 0 20px;
  overflow: hidden;
}
.progress-fill {
  height: 100%;
  background: linear-gradient(to right, #c85a2a, #d86c3e);
  width: 0%;
  transition: width 0.3s;
}

.log {
  background: #1a1714;
  color: #9FE1CB;
  font-family: 'SF Mono', Consolas, monospace;
  font-size: 12px;
  padding: 16px;
  border-radius: 8px;
  max-height: 400px;
  overflow-y: auto;
  margin-top: 16px;
  white-space: pre-wrap;
}
.log-success { color: #9FE1CB; }
.log-error { color: #F7C1C1; }
.log-warn { color: #FAC775; }
.log-info { color: #85B7EB; }

.settings-row {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 12px;
}

@media (max-width: 600px) {
  .stats { grid-template-columns: repeat(2, 1fr); }
  .settings-row { grid-template-columns: 1fr; }
}
</style>
</head>
<body>

<h1>🤖 Batch AI-berigelse</h1>
<p class="intro">Beriger vurderinger automatisk med AI-genereret indhold (bullets, per-kategori tekster, FAQ). Kører en ad gangen i baggrunden.</p>

<div class="panel">
  <h3 style="margin-bottom: 12px">Login</h3>
  <label>Supabase URL</label>
  <input type="text" id="supaUrl" value="https://numlafmwxgffshqcjxuc.supabase.co" readonly>
  <label>Supabase Anon Key</label>
  <input type="text" id="supaKey" placeholder="Sæt ind din anon-nøgle" value="eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im51bWxhZm13eGdmZnNocWNqeHVjIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzUyMjU0NTgsImV4cCI6MjA5MDgwMTQ1OH0.WojLfL2iz1ZDt6PeRqeGbC8BvJwwPdk4pzxZM390xbI">
  <button onclick="loadStats()">📊 Hent statistik</button>
</div>

<div class="panel" id="statsPanel" style="display:none">
  <h3 style="margin-bottom: 12px">Status</h3>
  <div class="stats">
    <div class="stat"><div class="stat-num" id="statTotal">—</div><div class="stat-label">I alt</div></div>
    <div class="stat"><div class="stat-num" id="statEnriched">—</div><div class="stat-label">Fase 1 ✓</div></div>
    <div class="stat"><div class="stat-num" id="statPending">—</div><div class="stat-label">Mangler</div></div>
    <div class="stat"><div class="stat-num" id="statApproved">—</div><div class="stat-label">Fase 2 ✓</div></div>
  </div>

  <div class="settings-row">
    <div>
      <label>Antal per batch</label>
      <select id="batchSize">
        <option value="1">1 (test)</option>
        <option value="5">5</option>
        <option value="10" selected>10</option>
        <option value="20">20</option>
        <option value="50">50</option>
        <option value="100">100</option>
      </select>
    </div>
    <div>
      <label>Fase</label>
      <select id="phase">
        <option value="fast" selected>Fase 1 — Hurtig (scores + bullets)</option>
        <option value="deep">Fase 2 — Grundig (kategori-tekster + FAQ)</option>
        <option value="conversations">Fase 3 — Samtaler (spørgsmål + kilder)</option>
      </select>
    </div>
  </div>

  <div class="progress-bar">
    <div class="progress-fill" id="progressFill"></div>
  </div>

  <button id="startBtn" onclick="startBatch()">▶️ Start berigelse</button>
  <button id="stopBtn" class="danger" onclick="stopBatch()" style="display:none">⏸️ Stop</button>
  <button class="secondary" onclick="loadStats()">🔄 Opdater status</button>
</div>

<div class="log" id="log" style="display:none"></div>

<script>
let db = null;
let isRunning = false;
let shouldStop = false;

function log(msg, cls = '') {
  const el = document.getElementById('log');
  el.style.display = 'block';
  const line = document.createElement('div');
  line.className = 'log-' + (cls || 'info');
  const time = new Date().toLocaleTimeString('da-DK');
  line.textContent = `[${time}] ${msg}`;
  el.appendChild(line);
  el.scrollTop = el.scrollHeight;
}

async function loadStats() {
  const url = document.getElementById('supaUrl').value.trim();
  const key = document.getElementById('supaKey').value.trim();

  if (!url || !key) { alert('Udfyld URL og nøgle'); return; }

  db = supabase.createClient(url, key);
  log('Henter statistik...', 'info');

  try {
    // Total
    const { count: total, error: e1 } = await db.from('ratings').select('*', { count: 'exact', head: true });
    if (e1) throw e1;

    // Fase 1 færdig (har ai_bullets)
    const { count: phase1, error: e2 } = await db.from('ratings').select('*', { count: 'exact', head: true }).not('ai_bullets', 'is', null);
    if (e2) throw e2;

    // Fase 2 færdig (har ai_category_texts)
    const { count: phase2, error: e3 } = await db.from('ratings').select('*', { count: 'exact', head: true }).not('ai_category_texts', 'is', null);
    if (e3) throw e3;

    document.getElementById('statTotal').textContent = total;
    document.getElementById('statEnriched').textContent = phase1;
    document.getElementById('statPending').textContent = total - phase1;
    document.getElementById('statApproved').textContent = phase2;
    document.getElementById('statsPanel').style.display = 'block';

    log(`✓ Statistik: ${total} total | Fase 1: ${phase1}/${total} | Fase 2: ${phase2}/${total}`, 'success');
  } catch (err) {
    log('✗ Fejl: ' + err.message, 'error');
  }
}

async function startBatch() {
  if (isRunning) return;
  isRunning = true;
  shouldStop = false;

  document.getElementById('startBtn').style.display = 'none';
  document.getElementById('stopBtn').style.display = 'inline-block';

  const batchSize = parseInt(document.getElementById('batchSize').value);
  const phase = document.getElementById('phase').value;

  const phaseLabels = {
    fast: 'FASE 1: Hurtig',
    deep: 'FASE 2: Grundig',
    conversations: 'FASE 3: Samtaler'
  };
  log(`🚀 Starter batch (${phaseLabels[phase] || phase}, ${batchSize} titler)...`, 'info');

  try {
    // Hent vurderinger der mangler den relevante berigelse
    let query = db.from('ratings').select('id, title, platform, episode, notes, content_type, status, ai_scores, recommended_age')
      .order('created_at', { ascending: true })
      .limit(batchSize);

    if (phase === 'fast') {
      // Fase 1: mangler ai_bullets
      query = query.is('ai_bullets', null);
    } else if (phase === 'deep') {
      // Fase 2: har ai_bullets men mangler ai_category_texts
      query = query.not('ai_bullets', 'is', null).is('ai_category_texts', null);
    } else if (phase === 'conversations') {
      // Fase 3: har ai_bullets men mangler ai_conversations
      query = query.not('ai_bullets', 'is', null).is('ai_conversations', null);
    }

    const { data: items, error } = await query;
    if (error) throw error;

    if (!items || items.length === 0) {
      log(`✓ Ingen vurderinger mangler ${phase === 'fast' ? 'fase 1' : 'fase 2'}!`, 'success');
      finish();
      return;
    }

    log(`📋 Fundet ${items.length} vurderinger at berige`, 'info');

    let successCount = 0;
    let errorCount = 0;

    for (let i = 0; i < items.length; i++) {
      if (shouldStop) {
        log(`⏸️ Stoppet af bruger efter ${i} vurderinger`, 'warn');
        break;
      }

      const item = items[i];
      const pct = ((i + 1) / items.length * 100).toFixed(0);
      document.getElementById('progressFill').style.width = pct + '%';

      log(`[${i+1}/${items.length}] Beriger "${item.title}" (${item.platform})...`, 'info');

      let attempts = 0;
      let success = false;
      const maxAttempts = 2;

      while (attempts < maxAttempts && !success && !shouldStop) {
        attempts++;
        let isTimeout = false;

        try {
          let endpoint, body;
          if (phase === 'fast') {
            endpoint = '/.netlify/functions/enrich';
            body = { title: item.title, platform: item.platform, episode: item.episode, notes: item.notes, ratingId: item.id };
          } else if (phase === 'deep') {
            endpoint = '/.netlify/functions/enrich-deep';
            body = { title: item.title, platform: item.platform, episode: item.episode, notes: item.notes, ai_scores: item.ai_scores, recommended_age: item.recommended_age, ratingId: item.id };
          } else {
            endpoint = '/.netlify/functions/enrich-conversations';
            body = { title: item.title, platform: item.platform, episode: item.episode, ai_scores: item.ai_scores, recommended_age: item.recommended_age, ratingId: item.id };
          }

          const response = await fetch(endpoint, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(body)
          });

          const responseText = await response.text();

          if (responseText.trim().startsWith('<') || !response.headers.get('content-type')?.includes('application/json')) {
            isTimeout = true;
            throw new Error('Netlify timeout');
          }

          let result;
          try {
            result = JSON.parse(responseText);
          } catch (parseErr) {
            isTimeout = true;
            throw new Error('Invalid JSON');
          }

          if (!result.success) {
            log(`  ✗ API-fejl: ${result.error}`, 'error');
            errorCount++;
            break;
          }

          const e = result.enrichment;
          let updateData = { enriched_at: new Date().toISOString() };

          if (phase === 'fast') {
            updateData.ai_bullets = e.ai_bullets;
            updateData.ai_analysis = e.ai_analysis;
            updateData.ai_scores = e.ai_scores;
            updateData.recommended_age = e.recommended_age;
            updateData.age_group = e.age_group;
          } else if (phase === 'deep') {
            updateData.ai_category_texts = e.ai_category_texts;
            updateData.ai_faq = e.ai_faq;
          } else {
            updateData.ai_conversations = e.ai_conversations;
          }

          const { error: updateError } = await db.from('ratings').update(updateData).eq('id', item.id);

          if (updateError) {
            log(`  ✗ DB-fejl: ${updateError.message}`, 'error');
            errorCount++;
            break;
          }

          const extra = phase === 'fast' ? ` (${e.recommended_age} år)` : '';
          log(`  ✓ Beriget${extra}`, 'success');
          successCount++;
          success = true;

        } catch (err) {
          if (attempts < maxAttempts && isTimeout) {
            log(`  ⚠️ Timeout — prøver én gang til`, 'warn');
            await new Promise(r => setTimeout(r, 8000));
          } else {
            log(`  ✗ Springer over: ${err.message}`, 'error');
            errorCount++;
            break;
          }
        }
      }

      await new Promise(r => setTimeout(r, 1500));
    }

    log(`🎉 Færdig: ${successCount} berigede, ${errorCount} fejl`, 'success');
    await loadStats();

  } catch (err) {
    log('✗ Fatal fejl: ' + err.message, 'error');
  } finally {
    finish();
  }
}

function stopBatch() {
  shouldStop = true;
  log('⏸️ Stopper efter nuværende berigelse...', 'warn');
}

function finish() {
  isRunning = false;
  shouldStop = false;
  document.getElementById('startBtn').style.display = 'inline-block';
  document.getElementById('stopBtn').style.display = 'none';
}
</script>

</body>
</html>
